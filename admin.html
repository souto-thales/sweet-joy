<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Sweet &amp; Joy</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #FFF0EE;
      --primary: #C4867A;
      --accent:  #3D2B2B;
      --white:   #FFFFFF;
      --border:  #e8d5d2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--accent);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }
    .logo { width: 72px; margin-bottom: 1rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 600; }
    .subtitle { font-size: 0.8rem; color: var(--primary); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.25rem; margin-bottom: 2rem; }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(61,43,43,0.07);
    }

    /* ---- LOGIN STATE ---- */
    #loginView { display: flex; flex-direction: column; gap: 0; }
    #loginView p {
      font-size: 0.875rem;
      color: #8a7070;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    /* ---- ADMIN STATE ---- */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    .status-badge.available { background: #e8f5e9; color: #2e7d32; }
    .status-badge.away      { background: #fce8e6; color: #b94037; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-badge.available .status-dot { background: #2e7d32; }
    .status-badge.away      .status-dot { background: #b94037; }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* ---- SHARED FORM ELEMENTS ---- */
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      color: var(--accent);
    }
    input[type="date"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      color: var(--accent);
      background: var(--bg);
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="date"]:focus,
    input[type="password"]:focus,
    textarea:focus { border-color: var(--primary); }
    textarea { min-height: 90px; resize: vertical; line-height: 1.5; }

    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0; }
    .date-row input[type="date"] { margin-bottom: 0; }
    .date-row > div { display: flex; flex-direction: column; }
    .date-row > div label { margin-bottom: 0.4rem; }
    .date-row-wrap { margin-bottom: 1rem; }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      text-align: center;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:not(:disabled):hover { background: #b37568; }
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
      margin-top: 0.6rem;
    }
    .btn-outline:not(:disabled):hover { background: #fce8e6; }
    .btn-ghost {
      background: transparent;
      color: #a08080;
      font-size: 0.8rem;
      padding: 0.5rem;
      margin-top: 0.5rem;
      border: none;
    }
    .btn-ghost:hover { color: var(--primary); }

    .toast {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-top: 0.75rem;
    }
    .toast.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .toast.error   { background: #fce8e6; color: #b94037; display: block; }

    .helper { font-size: 0.78rem; color: #8a7070; margin-top: -0.6rem; margin-bottom: 1rem; }
    .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header-row .status-badge { margin-bottom: 0; }
  </style>
</head>
<body>

<img src="/assets/images/logo.png" alt="Sweet &amp; Joy" class="logo" />
<h1>Admin Panel</h1>
<p class="subtitle">Vacation &amp; Availability</p>

<!-- LOGIN VIEW -->
<div class="card" id="loginView">
  <p class="section-title">Sign in</p>
  <p>Enter the admin password to manage vacation settings.</p>
  <label for="passwordInput">Password</label>
  <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password" />
  <button class="btn btn-primary" id="loginBtn" onclick="login()">Sign in</button>
  <div class="toast" id="loginToast"></div>
</div>

<!-- ADMIN VIEW -->
<div class="card" id="adminView" style="display:none">
  <div class="header-row">
    <div id="statusBadge" class="status-badge available">
      <span class="status-dot"></span>
      <span id="statusText">Loading…</span>
    </div>
    <button class="btn-ghost btn" onclick="logout()">Sign out</button>
  </div>

  <p class="section-title">Vacation Mode</p>

  <div class="date-row-wrap">
    <div class="date-row">
      <div>
        <label for="startDate">First day away</label>
        <input type="date" id="startDate" />
      </div>
      <div>
        <label for="endDate">Last day away</label>
        <input type="date" id="endDate" />
      </div>
    </div>
  </div>

  <label for="awayMsg">Message shown to visitors</label>
  <textarea id="awayMsg" placeholder="e.g. I'll be back June 27th and will respond to all messages then!"></textarea>
  <p class="helper">This appears on the website banner and order form during your absence.</p>

  <button class="btn btn-primary" id="saveBtn" onclick="saveVacation()">Enable Vacation Mode</button>
  <button class="btn btn-outline" id="disableBtn" onclick="disableVacation()" style="display:none">Disable Vacation Mode</button>

  <div class="toast" id="adminToast"></div>
</div>

<script>
  const TOKEN_KEY = 'sj.admin.token';
  let isActive = false;

  const API = 'https://sweet-joy.thalessouto.workers.dev';

  // ---- AUTH ----

  function getToken() {
    return localStorage.getItem(TOKEN_KEY);
  }

  function showLogin() {
    document.getElementById('loginView').style.display = 'block';
    document.getElementById('adminView').style.display = 'none';
  }

  function showAdmin() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('adminView').style.display = 'block';
  }

  async function login() {
    const password = document.getElementById('passwordInput').value;
    if (!password) return;

    setLoading('loginBtn', true, 'Signing in…');
    try {
      const res = await fetch(`${API}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (!res.ok) {
        showToast('loginToast', data.error || 'Invalid password.', 'error');
        return;
      }
      localStorage.setItem(TOKEN_KEY, data.token);
      document.getElementById('passwordInput').value = '';
      showAdmin();
      loadStatus();
    } catch {
      showToast('loginToast', 'Could not connect. Please try again.', 'error');
    } finally {
      setLoading('loginBtn', false, 'Sign in');
    }
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    showLogin();
  }

  // Allow Enter key on password field
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // ---- VACATION STATUS ----

  async function loadStatus() {
    try {
      const res = await fetch(`${API}/api/vacation`);
      const data = await res.json();
      isActive = !!data.vacationMode;
      renderStatus(data);
    } catch {
      showToast('adminToast', 'Could not load current status.', 'error');
    }
  }

  function renderStatus(data) {
    const badge      = document.getElementById('statusBadge');
    const text       = document.getElementById('statusText');
    const saveBtn    = document.getElementById('saveBtn');
    const disableBtn = document.getElementById('disableBtn');

    if (data.vacationMode) {
      badge.className = 'status-badge away';
      text.textContent = `Away — back ${fmt(data.endDate)}`;
      document.getElementById('startDate').value = data.startDate || '';
      document.getElementById('endDate').value   = data.endDate   || '';
      document.getElementById('awayMsg').value   = data.message   || '';
      saveBtn.textContent = 'Update Dates';
      disableBtn.style.display = 'block';
    } else {
      badge.className = 'status-badge available';
      text.textContent = 'Available — taking orders';
      saveBtn.textContent = 'Enable Vacation Mode';
      disableBtn.style.display = 'none';
    }
  }

  async function saveVacation() {
    const start = document.getElementById('startDate').value;
    const end   = document.getElementById('endDate').value;
    const msg   = document.getElementById('awayMsg').value.trim();

    if (!start || !end) return showToast('adminToast', 'Please select both start and end dates.', 'error');
    if (end < start)    return showToast('adminToast', 'End date must be after start date.', 'error');
    if (!msg)           return showToast('adminToast', 'Please add a message for visitors.', 'error');

    setLoading('saveBtn', true, 'Saving…');
    try {
      const ok = await postVacation({ vacationMode: true, startDate: start, endDate: end, message: msg });
      if (!ok) return;
      showToast('adminToast', `Vacation mode ON — site shows away notice from ${fmt(start)} to ${fmt(end)}.`, 'success');
      await loadStatus();
    } finally {
      setLoading('saveBtn', false, isActive ? 'Update Dates' : 'Enable Vacation Mode');
    }
  }

  async function disableVacation() {
    setLoading('disableBtn', true, 'Disabling…');
    try {
      const ok = await postVacation({ vacationMode: false });
      if (!ok) return;
      showToast('adminToast', "Vacation mode OFF. You're back to taking orders!", 'success');
      await loadStatus();
    } finally {
      setLoading('disableBtn', false, 'Disable Vacation Mode');
    }
  }

  async function postVacation(body) {
    try {
      const res = await fetch(`${API}/api/admin/vacation`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`
        },
        body: JSON.stringify(body)
      });
      if (res.status === 401) {
        logout();
        return false;
      }
      if (!res.ok) throw new Error();
      return true;
    } catch {
      showToast('adminToast', 'Something went wrong. Please try again.', 'error');
      return false;
    }
  }

  // ---- UTILS ----

  function fmt(dateStr) {
    if (!dateStr) return '';
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  }

  function setLoading(id, loading, label) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.disabled = loading;
    btn.textContent = label;
  }

  function showToast(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = `toast ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'toast'; }, 6000);
  }

  // ---- INIT ----

  if (getToken()) {
    showAdmin();
    loadStatus();
  } else {
    showLogin();
  }
</script>
</body>
</html>
