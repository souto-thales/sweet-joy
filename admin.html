<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Sweet &amp; Joy</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #FFF0EE;
      --primary: #C4867A;
      --accent:  #3D2B2B;
      --white:   #FFFFFF;
      --border:  #e8d5d2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--accent);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }
    .logo { width: 72px; margin-bottom: 1rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.75rem; font-weight: 600; }
    .subtitle { font-size: 0.8rem; color: var(--primary); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.25rem; margin-bottom: 2rem; }

    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(61,43,43,0.07);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.8rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    .status-badge.available { background: #e8f5e9; color: #2e7d32; }
    .status-badge.away      { background: #fce8e6; color: #b94037; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-badge.available .status-dot { background: #2e7d32; }
    .status-badge.away      .status-dot { background: #b94037; }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      color: var(--accent);
    }
    input[type="date"], textarea {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      color: var(--accent);
      background: var(--bg);
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="date"]:focus, textarea:focus { border-color: var(--primary); }
    textarea { min-height: 90px; resize: vertical; line-height: 1.5; }

    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0; }
    .date-row input[type="date"] { margin-bottom: 0; }
    .date-row > div { display: flex; flex-direction: column; }
    .date-row > div label { margin-bottom: 0.4rem; }
    .date-row-wrap { margin-bottom: 1rem; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      text-align: center;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:not(:disabled):hover { background: #b37568; }
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
      margin-top: 0.6rem;
    }
    .btn-outline:not(:disabled):hover { background: #fce8e6; }

    .toast {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-top: 0.75rem;
    }
    .toast.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .toast.error   { background: #fce8e6; color: #b94037; display: block; }

    .helper { font-size: 0.78rem; color: #8a7070; margin-top: -0.6rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

<img src="/assets/images/logo.png" alt="Sweet &amp; Joy" class="logo" />
<h1>Admin Panel</h1>
<p class="subtitle">Vacation &amp; Availability</p>

<div class="card">
  <div id="statusBadge" class="status-badge available">
    <span class="status-dot"></span>
    <span id="statusText">Loading…</span>
  </div>

  <p class="section-title">Vacation Mode</p>

  <div class="date-row-wrap">
    <div class="date-row">
      <div>
        <label for="startDate">First day away</label>
        <input type="date" id="startDate" />
      </div>
      <div>
        <label for="endDate">Last day away</label>
        <input type="date" id="endDate" />
      </div>
    </div>
  </div>

  <label for="awayMsg">Message shown to visitors</label>
  <textarea id="awayMsg" placeholder="e.g. I'll be back June 27th and will respond to all messages then!"></textarea>
  <p class="helper">This appears on the website banner and order form during your absence.</p>

  <button class="btn btn-primary" id="saveBtn" onclick="saveVacation()">Enable Vacation Mode</button>
  <button class="btn btn-outline" id="disableBtn" onclick="disableVacation()" style="display:none">Disable Vacation Mode</button>

  <div class="toast" id="toast"></div>
</div>

<script>
  let isActive = false;

  async function load() {
    try {
      const res = await fetch('/api/vacation');
      const data = await res.json();
      isActive = !!data.vacationMode;
      renderStatus(data);
    } catch {
      showToast('Could not load current status. Check your connection.', 'error');
    }
  }

  function renderStatus(data) {
    const badge  = document.getElementById('statusBadge');
    const text   = document.getElementById('statusText');
    const saveBtn    = document.getElementById('saveBtn');
    const disableBtn = document.getElementById('disableBtn');

    if (data.vacationMode) {
      badge.className = 'status-badge away';
      const end = fmt(data.endDate);
      text.textContent = `Away — back ${end}`;
      document.getElementById('startDate').value = data.startDate || '';
      document.getElementById('endDate').value   = data.endDate   || '';
      document.getElementById('awayMsg').value   = data.message   || '';
      saveBtn.textContent = 'Update Dates';
      disableBtn.style.display = 'block';
    } else {
      badge.className = 'status-badge available';
      text.textContent = 'Available — taking orders';
      saveBtn.textContent = 'Enable Vacation Mode';
      disableBtn.style.display = 'none';
    }
  }

  async function saveVacation() {
    const start = document.getElementById('startDate').value;
    const end   = document.getElementById('endDate').value;
    const msg   = document.getElementById('awayMsg').value.trim();

    if (!start || !end) return showToast('Please select both start and end dates.', 'error');
    if (end < start)    return showToast('End date must be after start date.', 'error');
    if (!msg)           return showToast('Please add a message for visitors.', 'error');

    setLoading('saveBtn', true, 'Saving…');
    try {
      const res = await fetch('/api/admin/vacation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vacationMode: true, startDate: start, endDate: end, message: msg })
      });
      if (!res.ok) throw new Error();
      showToast(`Vacation mode ON. Site will show the away notice from ${fmt(start)} to ${fmt(end)}.`, 'success');
      await load();
    } catch {
      showToast('Something went wrong. Please try again.', 'error');
    } finally {
      setLoading('saveBtn', false, isActive ? 'Update Dates' : 'Enable Vacation Mode');
    }
  }

  async function disableVacation() {
    setLoading('disableBtn', true, 'Disabling…');
    try {
      const res = await fetch('/api/admin/vacation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vacationMode: false })
      });
      if (!res.ok) throw new Error();
      showToast('Vacation mode OFF. You\'re back to taking orders!', 'success');
      await load();
    } catch {
      showToast('Something went wrong. Please try again.', 'error');
    } finally {
      setLoading('disableBtn', false, 'Disable Vacation Mode');
    }
  }

  function fmt(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  }

  function setLoading(id, loading, label) {
    const btn = document.getElementById(id);
    btn.disabled = loading;
    btn.textContent = label;
  }

  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type}`;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = 'toast'; }, 6000);
  }

  load();
</script>
</body>
</html>
