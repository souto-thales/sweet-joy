name: Sync fork

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'souto-thales/sweet-joy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trigger sync in MarcosSulevis repo
        env:
          GH_TOKEN: ${{ secrets.MARCOS_SYNC_TOKEN }}
        run: |
          gh api repos/MarcosSulevis/sweet-joy/dispatches \
            --field event_type="sync-from-upstream"
