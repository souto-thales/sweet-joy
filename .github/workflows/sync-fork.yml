name: Sync fork

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync fork via GitHub API
        env:
          MARCOS_TOKEN: ${{ secrets.MARCOS_SYNC_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token ${MARCOS_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/MarcosSulevis/sweet-joy/merge-upstream \
            -d '{"branch":"main"}'

      - name: Trigger Cloudflare deploy
        run: |
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
